name: Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.PRAKASH_EC2 }}
          username: ubuntu
          key: ${{ secrets.PRAKASH_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.PRAKASH_EC2 }}
          username: ubuntu
          key: ${{ secrets.PRAKASH_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            echo "${{ secrets.PROD_PROPERTIES }}" > /home/ubuntu/app/application-prod.properties
            sudo fuser -k 8080/tcp || true
            nohup java -jar -Dspring.profiles.active=prod /home/ubuntu/app/target/*.jar > /home/ubuntu/app/app.log 2>&1 &
            echo "App started!"